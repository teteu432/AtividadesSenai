<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="receber-dados.html" method="POST">
        <label for="Nome">Nome:</label>
        <input type="text" name="Nome" id="Nome">
        <br>
        <label for="Email">E-mail</label>
        <input type="text" name="Email" id="Email">
        <br>
        <input type="radio" name="sexo" value="masculino">masculino
        <input type="radio" name="sexo" value="feminino">feminino
        <br>
        <input type="checkbox" name="hobbies[]" id="">Ouvir musica
        <input type="checkbox" name="hobbies[]" id="">Dormir
        <input type="checkbox" name="hobbies[]" id="">Tocar teclado
        <br>
        <select id="Estado">
            <option value="">Selecione</option>
            <option value="Ac">Acre</option>
            <option value="Sp">São Paulo</option>
            <option value="Mg">Minas Gerais</option>

        </select>

        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="Nome">Nome</label>
            <input type="text" id="Nome">
            <label for="Email">E-mail</label>
            <input type="text" id="Email">
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="1" max="120" step="1" value="18">
            <br>

            <label for="points">Pontuação</label>
            <input type="range" id="points" name="points" min="0" max="10">
            <br>

            <input type="text" placeholder="Digite seu nome">
            <input type="text" placeholder="DIgite se E-mail" required>
            <input type="text" placeholder="Digite seu sobre nome" autofocus>
            <input type="text" placeholder="Não editavél" disabled>
        </fieldset>
    </form>
</body>

</html>
