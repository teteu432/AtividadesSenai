    <Fieldset>
        <form action="">
        <legend>Cadastro</legend>
        <label for="Nome">Nome</label>
        <input type="text" id="Nome">
        <input type="radio" name="sexo" value="masculino">Masculino
        <input type="radio" name="sexo" value="feminino">Feminino
        <br>

        <label for="CPF">CPF:</label>
        <input type="text" id="CPF">
        <label for="RG">RG:</label>
        <input type="text" id="RG">
        <label for="Nacimento">Nascimento</label>
        <input type="number" name="Nacimento" id="Nacimento" min="1930" max="2026" value="2008">
        <br>
        <label for="DDD">DDD</label>
        <input type="number" id="DDD" style="width: 40px;">
        <label for="Telefone">Telefone</label>
        <input type="text" id="Telefone" style="width: 100px;">
        <br>
        
            <label for="Email">E-mail</label>
            <input type="text" id="Email">
            <label for="Senha">Senha</label>
            <input type="text" id="Senha">
            <label for="ConfSenha">Confirmar Senha</label>
            <input type="text" id="ConfSenha">
            <br>
            <label for="Cep">Cep</label>
            <input type="text" id="Cep" style="width: 60px;">
            <label for="Endereco">Endereço</label>
            <input type="text" id="Endereco">
            <label for="Numero">Numero</label>
            <input type="text" id="Numero" style="width: 40px;">
            <br>
            <label for="Bairro">Bairro</label>
            <input type="text" id="Bairro">
            <label for="complemento">Complemento</label>
            <input type="text" id="Complemento">
            <label for="Cidade">Cidade</label>
            <input type="text" id="Cidade">
            <label for="Estado">Estado</label>
            <select  id="Estado">
                <option value="">Selecione</option>
            <option value="Ac">Acre</option>
            <option value="Sp">São Paulo</option>
            <option value="Mg">Minas Gerais</option>
            </select>
<br>
<label for="data">Data</label>
    <input type="date" id="data" name="data" min="1900-01-01" max="2020-12-31" value="30-12-2018">
    <label for="">Data e Hora</label>
    <input type="datetime-local">
            <label for="">Enviar arquivo:</label>
    <input type="file" accept="image/*">

<br>
    <label for="">Seu site:</label>
    <input type="url">
    <button type="button">Enviar</button>

<br>
    <label for="">Telefone</label>
    <input type="tel" pattern="[0-9]+" inputmode="numeric">

<br>
    <label for="">Buscar</label>
    <input type="search">


    <label for="">Escolha um navegador</label>
    <input list="navegadores">
    <datalist id="navegadores">
        <option value="Chrome"></option>
        <option value="Firebox"></option>
        <option value="Edge"></option>
        <option value="Safari"></option>
   </datalist>


<br>
            
             <button type="button">Salvar</button>
            
            </form>

    </Fieldset>
    <label for="Progresso">Progresso</label>
    <progress value="70" max="100"></progress>
