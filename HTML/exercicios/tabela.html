<!--
<tabela/tabela> define a tabela
<caption> legenda da tabela
    <tr></tr> adiciona uma linha na tabela
    <th></th>adiciona uma célula de cabeçalho texto negrito
    td adiciona uma célula de dado comum a linha esquerda
    
    thead cabeçalho da tabela
    tboody corpo da tabela
    tfoot rodapé da tabela-->

    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }
        table{
            border-collapse: collapse;
            width: 70%;
            margin-top: 10px;
        }
        caption{
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: left;
        }
        th{
            background-color: lightgrey;
        }
        td{
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Tabela</h1>

    <table>
        <caption>Cadastro de clientes</caption>

        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Cargo</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Mateus</td>
                <td>mateus.silvajesus19@gmail.com</td>
                <td>11 9554-3455</td>
                <td>Auxiliar de construção de bombas termonucleares</td>
            </tr>
            <tr>
                <td>Mateus</td>
                <td>mateus.silvajesus19@gmail.com</td>
                <td>11 4555-5444</td>
                <td>Auxiliar de construção de bombas termonucleares</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3"></td>
                <td>Total:</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
